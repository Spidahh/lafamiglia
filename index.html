<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Famiglia – Schede Progetto</title>
  <meta name="description" content="Gestione progetti e diario lavori di famiglia.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sidebar Case -->
  <aside class="sidebar">
    <div class="logo-area">
      <span>🏡</span>
      <h1>La Famiglia</h1>
    </div>
    
    <div class="section-label">Le Mie Case</div>
    
    <div class="root-list" id="rootList">
      <!-- Injected by app.js -->
    </div>
    
    <div style="margin-top: 20px;">
      <button class="add-root-btn" onclick="openNewRootModal()">+ Aggiungi Casa</button>
    </div>
  </aside>

  <!-- Pannello Principale Progetti -->
  <main class="main-board" id="mainBoard">
    <!-- Injected by app.js -->
  </main>

  <!-- Pannello Laterale Diario Task (Offcanvas) -->
  <aside class="task-panel" id="taskPanel">
    
    <div class="panel-header">
      <div class="panel-top-row">
        <div>
          <span class="task-category" id="tpCategory" style="margin-bottom:8px"></span>
          <h2 class="pt-title" id="tpTitle">Titolo Task</h2>
        </div>
        <button class="close-panel-btn" onclick="closeTaskPanel()">×</button>
      </div>

      <div class="panel-actions" style="margin-top:16px;">
        <select class="status-select" id="tpStatusSelect" onchange="handleStatusChange(event)">
          <option value="todo">🔘 Da iniziare</option>
          <option value="doing">⏳ In corso / Attivo</option>
          <option value="waiting">✋ In attesa (Risposta/Pezzi)</option>
          <option value="done">✅ Completato</option>
        </select>
        <button class="action-icon danger" style="margin-left:auto" onclick="handleDeleteTaskProcess()" title="Elimina intero progetto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
      </div>
    </div>

    <!-- Timeline dei Log -->
    <div class="panel-body">
      <div class="section-label" style="padding:0; margin-bottom:16px;">Diario attività</div>
      <div class="timeline" id="tpTimeline">
        <!-- Injected -->
      </div>
    </div>

    <!-- Add Nuovo Log -->
    <div class="new-log-area">
      <textarea id="newLogText" placeholder="Scrivi un aggiornamento... (Preventivo, nota, telefonata)"></textarea>
      <button class="send-log-btn" onclick="handleSendLog()">Annota Diario (Ctrl+Enter)</button>
    </div>

  </aside>

  <!-- MODAL Nuova Casa -->
  <div class="overlay" id="rootModal">
    <div class="modal-box">
      <h3>Nuova Casa / Luogo</h3>
      <div class="frm-group">
        <label>Nome (es. Casa in Montagna)</label>
        <input type="text" id="inpRootName" placeholder="Nome proprietà...">
      </div>
      <div class="frm-group">
        <label>Icona / Emoji</label>
        <input type="text" id="inpRootIcon" style="width: 80px; text-align:center;">
      </div>
      <div class="modal-footer">
        <button class="btn-txt" onclick="document.getElementById('rootModal').classList.remove('open')">Annulla</button>
        <button class="btn-solid" onclick="saveRootModal()">Salva</button>
      </div>
    </div>
  </div>

  <!-- MODAL Nuovo Progetto (Task) -->
  <div class="overlay" id="taskModal">
    <div class="modal-box">
      <h3>Crea Progetto</h3>
      
      <div class="frm-group">
        <label>Titolo / Lavoro da fare *</label>
        <input type="text" id="inpTaskTitle" placeholder="Es. Chiamare idraulico...">
      </div>
      
      <div style="display:flex; gap:16px;">
        <div class="frm-group" style="flex:1;">
          <label>Categoria (Es. Piscina, Impianti...)</label>
          <input type="text" id="inpTaskCat" placeholder="Opzionale">
        </div>
        <div class="frm-group" style="width:140px;">
          <label>Priorità</label>
          <select id="inpTaskPrio">
            <option value="alta">Alta</option>
            <option value="normale" selected>Normale</option>
            <option value="bassa">Bassa</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-txt" onclick="document.getElementById('taskModal').classList.remove('open')">Annulla</button>
        <button class="btn-solid" onclick="saveTaskModal()">Crea e apri Diario</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
