<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>La Famiglia – Gestione Lavori</title>
  <meta name="description" content="Organizzatore lavori di famiglia – casa e villa.">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body>

  <!-- ===== LOADING OVERLAY ===== -->
  <div id="appLoading" class="app-loading">
    <div class="app-loading-inner">
      <span class="app-loading-icon">🏡</span>
      <div class="app-loading-spinner"></div>
      <p>Connessione in corso…</p>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon">🏡</span>
      <span class="brand-name">La Famiglia</span>
    </div>

    <nav class="main-tabs" id="mainTabs">
      <button class="tab-btn active" data-tab="active" onclick="switchTab('active')">
        Lavori Attivi
        <span class="tab-badge" id="countActive">0</span>
      </button>
      <button class="tab-btn" data-tab="archive" onclick="switchTab('archive')">
        Archivio
        <span class="tab-badge archive-badge" id="countArchive">0</span>
      </button>
      <button class="tab-btn" data-tab="persona" onclick="switchTab('persona')">
        Per Persona
      </button>
    </nav>

    <div class="header-actions">
      <button class="btn-primary" onclick="openNewTaskModal()">
        <span class="btn-plus">+</span>
        <span class="btn-label">Nuovo Lavoro</span>
      </button>
      <button class="btn-icon-header" onclick="openPeopleModal()" title="Gestisci persone">👥</button>
      <button class="btn-icon-header" onclick="exportData()" title="Esporta dati">⬇️</button>
      <button class="btn-icon-header" onclick="document.getElementById('importFileInput').click()" title="Importa dati">⬆️</button>
    </div>
  </header>

  <!-- ===== CATEGORIA CHIPS ===== -->
  <div class="cat-chips-bar" id="catChipsBar">
    <button class="cat-chip active" data-cat="all" onclick="selectCategory('all')">Tutte</button>
    <!-- Injected by app.js -->
  </div>

  <!-- ===== BARRA RICERCA ===== -->
  <div class="search-bar-wrap" id="searchBarWrap">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Cerca lavori, note, persone..." oninput="applyFilters()">
      <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">✕</button>
    </div>
  </div>

  <!-- ===== CONTENUTO PRINCIPALE ===== -->
  <main class="main-content">

    <!-- TAB: Lavori Attivi -->
    <div class="tab-content active" id="tab-active">
      <div class="data-table-container">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th class="col-dot"></th>
              <th class="col-title" onclick="setSort('title')">Lavoro ↕</th>
              <th class="col-cat" onclick="setSort('category')">Categoria ↕</th>
              <th class="col-people">Chi</th>
              <th class="col-status" onclick="setSort('status')">Stato ↕</th>
              <th class="col-log">📝</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="no-results" id="noResultsMsg" style="display:none;"></div>
      </div>
    </div>

    <!-- TAB: Archivio -->
    <div class="tab-content" id="tab-archive">
      <div class="archive-header">
        <span class="archive-title-label">✅ Lavori completati — storico</span>
      </div>
      <div class="data-table-container">
        <table class="data-table data-table-archive" id="archiveTable">
          <thead>
            <tr>
              <th class="col-dot"></th>
              <th class="col-title">Lavoro</th>
              <th class="col-cat">Categoria</th>
              <th class="col-people">Chi</th>
              <th class="col-date">Completato</th>
              <th class="col-log">📝</th>
            </tr>
          </thead>
          <tbody id="archiveBody"></tbody>
        </table>
        <div class="no-results" id="noResultsArchive" style="display:none;"></div>
      </div>
    </div>

    <!-- TAB: Per Persona -->
    <div class="tab-content" id="tab-persona">
      <div class="persona-view" id="personaView"></div>
    </div>

  </main>

  <!-- ===== PANNELLO LATERALE ===== -->
  <div class="panel-overlay" id="panelOverlay" onclick="closeTaskPanel()"></div>
  <aside class="task-panel" id="taskPanel">
    <div class="panel-header">
      <div class="panel-top-row">
        <select class="pt-cat-select" id="tpCatSelect"></select>
        <button class="close-panel-btn" onclick="closeTaskPanel()">×</button>
      </div>
      <input class="pt-title-input" id="tpTitleInput" placeholder="Titolo lavoro...">
      <div class="pt-meta" id="tpMeta"></div>
      <div class="panel-assignees">
        <div class="assignee-picker" id="tpAssignees"></div>
      </div>
      <div class="panel-actions">
        <select class="status-select" id="tpStatusSelect" onchange="handleStatusChange(event)">
          <option value="todo">Da iniziare</option>
          <option value="doing">In lavorazione</option>
          <option value="waiting">In attesa</option>
          <option value="done">✅ Completato</option>
        </select>
        <button class="action-btn danger-btn" onclick="handleDeleteTaskProcess()">🗑️</button>
      </div>
    </div>

    <div class="panel-body">
      <div class="timeline" id="tpTimeline"></div>
    </div>

    <div class="new-log-area">
      <textarea id="newLogText" placeholder="Scrivi una nota nel diario... (Ctrl+Invio per salvare)"></textarea>
      <button class="send-log-btn" onclick="handleSendLog()">💾 Salva Nota</button>
    </div>
  </aside>


  <!-- ===== MODAL: Nuovo Lavoro ===== -->
  <div class="overlay" id="taskModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Nuovo Lavoro</h3>
        <button class="modal-close-btn" onclick="closeModal('taskModal')">×</button>
      </div>
      <div class="frm-group">
        <label>Titolo *</label>
        <input type="text" id="inpTaskTitle" placeholder="Cosa c'è da fare?">
      </div>
      <div class="frm-group">
        <label>Categoria *</label>
        <select id="inpTaskCat"></select>
      </div>
      <div class="frm-group">
        <label>Persone assegnate</label>
        <div class="assignee-picker" id="newTaskAssignees"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-txt" onclick="closeModal('taskModal')">Annulla</button>
        <button class="btn-solid" onclick="saveTaskModal()">Crea Lavoro</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Gestione Persone ===== -->
  <div class="overlay" id="peopleModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>👥 Persone</h3>
        <button class="modal-close-btn" onclick="closeModal('peopleModal')">×</button>
      </div>
      <div class="people-list" id="peopleList"></div>
      <div class="add-person-section" id="addPersonSection">
        <button class="add-person-toggle" onclick="toggleAddPerson()">
          <span class="add-person-toggle-icon">＋</span> Aggiungi persona
        </button>
        <div class="add-person-form">
          <div class="frm-group">
            <label>Nome *</label>
            <input type="text" id="inpNewPerson" placeholder="Es. Giuseppe">
          </div>
          <div class="frm-row">
            <div class="frm-group">
              <label>Telefono</label>
              <input type="tel" id="inpNewPhone" placeholder="+39 320 ...">
            </div>
            <div class="frm-group">
              <label>Mansione</label>
              <input type="text" id="inpNewRole" placeholder="Es. Idraulico">
            </div>
          </div>
          <button class="btn-solid" style="width:100%;" onclick="handleAddPerson()">+ Aggiungi</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-solid" onclick="closeModal('peopleModal')">Chiudi</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Import file ===== -->
  <input type="file" id="importFileInput" accept=".json" style="display:none;" onchange="handleImportFile(event)">

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
