<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Famiglia – Archivio Progetti</title>
  <meta name="description" content="Gestione e archivio progetti di famiglia.">
  <link rel="stylesheet" href="style.css">
  <!-- Font pulito e professionale -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Sidebar Case -->
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">🏡</div>
      <div class="logo-text">La Famiglia</div>
    </div>
    
    <div class="section-label">Proprietà</div>
    
    <div class="root-list" id="rootList">
      <!-- Injected by app.js -->
    </div>
    
    <button class="add-root-btn" onclick="openNewRootModal()">+ Nuova Proprietà</button>
  </aside>

  <!-- Pannello Principale (Tabella/Lista Compatta) -->
  <main class="main-content">
    
    <div class="top-bar">
      <h2 id="boardTitle">Nome Casa</h2>
      <button class="btn-primary" onclick="openNewTaskModal()">+ Nuovo Progetto</button>
    </div>

    <!-- Barra degli Strumenti (Ricerca e Filtri) -->
    <div class="toolbar">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="search-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Cerca progetto o testo nei diari..." oninput="applyFilters()">
      </div>

      <div class="filters">
        <select id="filterCategory" onchange="applyFilters()">
          <option value="all">Tutte le categorie</option>
          <!-- Injected by app.js -->
        </select>

        <select id="filterStatus" onchange="applyFilters()">
          <option value="all">Tutti gli stati</option>
          <option value="todo">Da iniziare</option>
          <option value="doing">In lavorazione</option>
          <option value="waiting">In attesa</option>
          <option value="done">Completati</option>
        </select>
      </div>
    </div>

    <!-- Container Tabella Dati -->
    <div class="data-table-container">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th style="width: 40px;"></th>
            <th>Progetto / Attività</th>
            <th style="width: 15%;">Categoria</th>
            <th style="width: 15%;">Stato</th>
            <th style="width: 10%; text-align: center;">Priorità</th>
            <th style="width: 15%; text-align: right;">Diario</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Injected by app.js -->
        </tbody>
      </table>
      
      <div class="no-results" id="noResultsMsg" style="display: none;">
        Nessun progetto trovato con questi filtri.
      </div>
    </div>

  </main>

  <!-- Pannello Laterale (Diario / Timeline) -->
  <aside class="task-panel" id="taskPanel">
    <div class="panel-header">
      <div class="panel-top-row">
        <div>
          <span class="pt-category" id="tpCategory"></span>
          <h2 class="pt-title" id="tpTitle">Titolo Task</h2>
        </div>
        <button class="close-panel-btn" onclick="closeTaskPanel()">×</button>
      </div>

      <div class="panel-actions">
        <select class="status-select" id="tpStatusSelect" onchange="handleStatusChange(event)">
          <option value="todo">Da iniziare</option>
          <option value="doing">In lavorazione</option>
          <option value="waiting">In attesa (Risposta/Pezzi)</option>
          <option value="done">Completato</option>
        </select>
        <button class="action-btn danger" onclick="handleDeleteTaskProcess()" title="Elimina intero progetto">Elimina</button>
      </div>
    </div>

    <!-- Timeline dei Log -->
    <div class="panel-body">
      <div class="timeline" id="tpTimeline">
        <!-- Injected -->
      </div>
    </div>

    <!-- Add Nuovo Log -->
    <div class="new-log-area">
      <textarea id="newLogText" placeholder="Scrivi un aggiornamento nel diario... (Preventivo, nota, chiamata)"></textarea>
      <button class="send-log-btn" onclick="handleSendLog()">Salva Nota</button>
    </div>
  </aside>


  <!-- MODAL Nuova Proprietà -->
  <div class="overlay" id="rootModal">
    <div class="modal-box">
      <h3>Nuova Proprietà</h3>
      <div class="frm-group">
        <label>Nome Proprietà</label>
        <input type="text" id="inpRootName" placeholder="Es. Casa Conversano">
      </div>
      <div class="modal-footer">
        <button class="btn-txt" onclick="document.getElementById('rootModal').classList.remove('open')">Annulla</button>
        <button class="btn-solid" onclick="saveRootModal()">Salva</button>
      </div>
    </div>
  </div>

  <!-- MODAL Nuovo Progetto -->
  <div class="overlay" id="taskModal">
    <div class="modal-box">
      <h3>Nuovo Progetto</h3>
      <div class="frm-group">
        <label>Titolo Progetto *</label>
        <input type="text" id="inpTaskTitle" placeholder="Cosa c'è da fare?">
      </div>
      <div style="display:flex; gap:16px;">
        <div class="frm-group" style="flex:1;">
          <label>Categoria</label>
          <input type="text" id="inpTaskCat" placeholder="Es. Piscina, Impianti (Opzionale)">
        </div>
        <div class="frm-group" style="width:140px;">
          <label>Priorità</label>
          <select id="inpTaskPrio">
            <option value="alta">Alta</option>
            <option value="normale" selected>Normale</option>
            <option value="bassa">Bassa</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-txt" onclick="document.getElementById('taskModal').classList.remove('open')">Annulla</button>
        <button class="btn-solid" onclick="saveTaskModal()">Crea Progetto</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
